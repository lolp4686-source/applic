services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nathan-dash
    ports:
      - "3000:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3
